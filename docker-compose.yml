# По умолчанию сервисы не стартуют (чтобы не мешать другим проектам).
# Включить этот стек: docker compose --profile four_dashboards up --build
# Приложение: http://localhost:3000
# Задайте надёжный NEXTAUTH_SECRET (например: openssl rand -base64 32)

services:
  db:
    profiles: [four_dashboards]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: four
      POSTGRES_PASSWORD: four
      POSTGRES_DB: four_dashboards
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U four -d four_dashboards"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    profiles: [four_dashboards]
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://four:four@db:5432/four_dashboards
      NEXTAUTH_URL: http://localhost:3000
      # Смените в проде — иначе сессии небезопасны
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-use-openssl-rand-base64-32}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
